<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 歐皇盲盒 - 猛藍粉紫專屬機台</title>
    <style>
        :root {
            --primary: #d32ce6;
            --dark-bg: #0b0c10;
            --card-bg: #14161d;
            --border-color: #222530;
            --pink: #d32ce6;
            --purple: #8847ff;
            --blue: #4b69ff;
        }

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            background-color: #07080b;
            padding: 15px 0;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .user-panel {
            display: flex;
            align-items: center;
        }

        .balance {
            background-color: rgba(211, 44, 230, 0.1);
            border: 1px solid var(--pink);
            padding: 6px 15px;
            border-radius: 20px;
            color: var(--pink);
            font-weight: bold;
            font-size: 14px;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
        }

        .notice-banner {
            background: linear-gradient(90deg, rgba(211,44,230,0.1) 0%, rgba(20,22,29,0.5) 100%);
            border: 1px solid #d32ce655;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
        }

        .cdk-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .cdk-input {
            background-color: #07080b;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            width: 180px;
            margin-right: 10px;
            text-align: center;
        }

        .machine-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .pity-container {
            background-color: #07080b;
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #1f212a;
        }

        .pity-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .pity-bar-bg {
            background-color: #222;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .pity-bar-fill {
            background: linear-gradient(90deg, var(--purple), var(--pink));
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--pink);
        }

        .roulette-viewport {
            width: 100%;
            height: 140px;
            background: linear-gradient(to bottom, #101114, #07080a);
            border: 2px solid #2d313d;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: #ffb700;
            z-index: 10;
            box-shadow: 0 0 10px #ffb700;
            transform: translateX(-50%);
        }

        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 15px;
            height: 110px;
            transform: translateX(0px);
        }

        .skin-card {
            width: 120px;
            height: 110px;
            background: rgba(30, 33, 41, 0.4);
            margin: 0 2px;
            flex-shrink: 0;
            border-bottom: 5px solid #888;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 5px;
            box-sizing: border-box;
            font-size: 11px;
            text-align: center;
        }

        .skin-name {
            font-weight: bold;
            color: #ffffff;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            line-height: 1.4;
        }

        .rarity-pink { border-bottom-color: var(--pink); background: radial-gradient(circle, rgba(99,21,105,0.3) 0%, rgba(20,22,29,0) 100%); } 
        .rarity-purple { border-bottom-color: var(--purple); background: radial-gradient(circle, rgba(54,19,102,0.3) 0%, rgba(20,22,29,0) 100%); } 
        .rarity-blue { border-bottom-color: var(--blue); background: radial-gradient(circle, rgba(20,40,102,0.3) 0%, rgba(20,22,29,0) 100%); }  

        .skip-control {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .btn {
            background: linear-gradient(135deg, var(--pink), #aa1cb8);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .inventory-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .inv-item {
            background-color: #0f1015;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-between;
            min-height: 100px;
        }

        .inv-item-name {
            font-size: 11px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .inv-actions {
            margin-top: auto;
            width: 100%;
        }

        .inv-btn {
            width: 100%;
            font-size: 11px;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .btn-withdraw { background-color: var(--pink); }

        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(20,22,29,0.98) 0%, rgba(5,5,8,1) 100%);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .reward-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--pink);
            margin-bottom: 30px;
        }

        .reward-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 90%;
            margin-bottom: 40px;
        }

        .reward-card {
            width: 150px;
            height: 150px;
            background-color: #1a1c24;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .reward-card-name {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            word-break: break-word;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CS2 歐皇盲盒系統</div>
        <div class="user-panel">
            <div class="balance" id="balance-val">0 金幣</div>
        </div>
    </header>

    <div class="container">
        <div class="notice-banner">
            ⚠️ <b>機台重要說明：</b><br>
            1. 當前運作機台：<b>🌸 猛藍粉紫刀槍機台</b>，單次抽獎消耗 <b>4 金幣 ($4 一次)</b>。<br>
            2. 本機台全面剔除紅色與黃色品種，只包含藍色、紫色與粉紅色等級道具。<br>
            3. 本機台設有硬性保底控制：<b>「本機台保底：20次必出粉」</b>，每次到達將百分百派發並重設進度。
        </div>

        <div class="cdk-section">
            <input type="text" class="cdk-input" id="cdk-input" placeholder="輸入充值CDK碼">
            <button class="btn" style="padding: 8px 15px; font-size:13px;" onclick="redeemCDK()">立即充值</button>
        </div>

        <div class="machine-box">
            <h2 id="machine-title">🌸 猛藍粉紫刀槍機台</h2>
            <p style="color: var(--pink); font-weight: bold; margin: 0 0 10px 0;">單次抽獎：4 金幣</p>

            <div class="pity-container">
                <div class="pity-info">
                    <span style="color: var(--pink); font-weight: bold;">💗 本機台保底：20次必出粉</span>
                    <span style="color: #aaa;" id="pity-percent-text">當前保底進度: 0 / 20 次</span>
                </div>
                <div class="pity-bar-bg">
                    <div class="pity-bar-fill" id="pity-bar-fill"></div>
                </div>
                <div style="font-size:11px; color:#aaa; text-align:left; margin-top:5px;" id="total-spins-status">
                    全局累計總抽數: 0 次
                </div>
            </div>

            <div class="roulette-viewport">
                <div class="pointer"></div>
                <div class="roulette-track" id="roulette-track"></div>
            </div>

            <label class="skip-control">
                <input type="checkbox" id="skip-animation-checkbox">
                <span>⚡ 跳過抽獎滾輪動畫（快刷專用）</span>
            </label>

            <div class="btn-group">
                <button class="btn" id="spin-btn-1" style="flex:1;" onclick="startSpin(1)">單抽 ($4)</button>
                <button class="btn" id="spin-btn-3" style="flex:1; background: linear-gradient(135deg, #7b1fa2, #e040fb);" onclick="startSpin(3)">三連抽 ($12)</button>
                <button class="btn" id="spin-btn-5" style="flex:1; background: linear-gradient(135deg, #4b69ff, #d32ce6);" onclick="startSpin(5)">五連抽 ($20)</button>
            </div>
        </div>

        <div class="inventory-section">
            <h3 style="margin-top: 0; display:flex; justify-content:space-between; align-items:center;">
                <span>🎒 臨時存儲背包</span>
                <span style="font-size:11px; color:var(--pink); font-weight:normal;">*道具只供提取，不設回收*</span>
            </h3>
            <div class="inventory-grid" id="inventory-grid"></div>
        </div>
    </div>

    <div class="fullscreen-modal" id="reward-fullscreen-modal">
        <div class="reward-title">🎉 恭喜獲得道具！</div>
        <div class="reward-container" id="fullscreen-reward-container"></div>
        <button class="btn" style="padding: 15px 50px; font-size:18px;" onclick="closeFullscreenModal()">收下道具</button>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('cs_balance_pink')) || 200;
        let inventory = JSON.parse(localStorage.getItem('cs_inventory_pink')) || [];
        let totalSpins = parseInt(localStorage.getItem('cs_total_spins_pink')) || 0;

        const VALID_CDKS = { "CS2-TEST-20": 20, "CS2-TEST-100": 100, "CS2-TEST-200": 200 };

        // 輪盤展示隨機池（完全不包含紅、黃）
        const MASTER_VISUAL_POOL = {
            blue: [
                { name: "FAMAS | Arctic Camo", rarity: "rarity-blue" }, { name: "SSG 08 | Desert Strike", rarity: "rarity-blue" },
                { name: "Nova | Heat", rarity: "rarity-blue" }, { name: "P90 | Big Cat", rarity: "rarity-blue" },
                { name: "Galil AR | Irradiated", rarity: "rarity-blue" }, { name: "Nova | Flutter", rarity: "rarity-blue" },
                { name: "Negev | Noctiflora", rarity: "rarity-blue" }, { name: "Tec-9 | Monarch", rarity: "rarity-blue" },
                { name: "XM1014 | Lilies", rarity: "rarity-blue" }, { name: "AUG | Overgrowth", rarity: "rarity-blue" },
                { name: "Negev | The Jungle", rarity: "rarity-blue" }, { name: "Nova | Slime", rarity: "rarity-blue" },
                { name: "P250 | Frutiger Aero", rarity: "rarity-blue" }, { name: "USP-S | SpecOps", rarity: "rarity-blue" },
                { name: "Desert Eagle | Turbo", rarity: "rarity-blue" }, { name: "XM1014 | Koi", rarity: "rarity-blue" },
                { name: "MP9 | Canyon", rarity: "rarity-blue" }, { name: "Glock-18 | Broken TV", rarity: "rarity-blue" },
                { name: "P90 | Database", rarity: "rarity-blue" }, { name: "AK-47 | Red Baron", rarity: "rarity-blue" },
                { name: "XM1014 | Splatter", rarity: "rarity-blue" }, { name: "AUG | Predator", rarity: "rarity-blue" },
                { name: "MAG-7 | Vision 7", rarity: "rarity-blue" }, { name: "Nova | Half-One", rarity: "rarity-blue" },
                { name: "Negev | Rotary Power", rarity: "rarity-blue" }
            ],
            purple: [
                { name: "FAMAS | Medic", rarity: "rarity-purple" }, { name: "MAC-10 | Ivory", rarity: "rarity-purple" },
                { name: "MAC-10 | Dahlia", rarity: "rarity-purple" }, { name: "SSG 08 | Labyrinth", rarity: "rarity-purple" },
                { name: "Dual Berettas | Vernal", rarity: "rarity-purple" }, { name: "AUG | Tension", rarity: "rarity-purple" },
                { name: "Sawed-Off | Panthers", rarity: "rarity-purple" }, { name: "Five-SeveN | Control", rarity: "rarity-purple" },
                { name: "FAMAS | Wallpaper", rarity: "rarity-purple" }, { name: "R8 Revolver | Bloody", rarity: "rarity-purple" },
                { name: "Galil AR | Feral", rarity: "rarity-purple" }, { name: "USP-S | Heated", rarity: "rarity-purple" },
                { name: "M4A1-S | BlackOps", rarity: "rarity-purple" }, { name: "AK-47 | Uniki", rarity: "rarity-purple" },
                { name: "MP9 | Paranoia", rarity: "rarity-purple" }, { name: "Tec-9 | Vice", rarity: "rarity-purple" },
                { name: "Tec-9 | Striker", rarity: "rarity-purple" }, { name: "P250 | Pulse", rarity: "rarity-purple" },
                { name: "AUG | Hot Rod", rarity: "rarity-purple" }, { name: "P250 | X-250", rarity: "rarity-purple" },
                { name: "Tec-9 | Timeless", rarity: "rarity-purple" }, { name: "MAC-10 | Nailgun", rarity: "rarity-purple" },
                { name: "Desert Eagle | Velocity", rarity: "rarity-purple" }, { name: "MP9 | Graffiti", rarity: "rarity-purple" },
                { name: "Desert Eagle | Paranoia", rarity: "rarity-purple" }, { name: "Dual Berettas | Tension", rarity: "rarity-purple" },
                { name: "Dual Berettas | Gilded", rarity: "rarity-purple" }
            ],
            pink: [
                { name: "P250 | Zen", rarity: "rarity-pink" }, { name: "SG 553 | Dynasty", rarity: "rarity-pink" },
                { name: "XM1014 | Office", rarity: "rarity-pink" }, { name: "Five-SeveN | X-Ray", rarity: "rarity-pink" },
                { name: "P250 | Mindspill", rarity: "rarity-pink" }, { name: "USP-S | Ajax", rarity: "rarity-pink" },
                { name: "P90 | Synthwave", rarity: "rarity-pink" }, { name: "Desert Eagle | Circuit", rarity: "rarity-pink" },
                { name: "AWP | Railgun", rarity: "rarity-pink" }, { name: "MP9 | Choke Oil", rarity: "rarity-pink" },
                { name: "AWP | Typhon", rarity: "rarity-pink" }, { name: "Sawed-Off | Improvised", rarity: "rarity-pink" },
                { name: "Dual Berettas | Inked", rarity: "rarity-pink" }, { name: "Zeus x27 | Overcharge", rarity: "rarity-pink" },
                { name: "Glock-18 | Fade", rarity: "rarity-pink" }, { name: "Desert Eagle | Mercy", rarity: "rarity-pink" },
                { name: "Glock-18 | Fuji", rarity: "rarity-pink" }, { name: "M4A4 | BubblePop", rarity: "rarity-pink" },
                { name: "Galil AR | Monochrome", rarity: "rarity-pink" }
            ]
        };

        // 玩家限制提取庫（不含任何紅、黃）
        const PLAYER_OWNED_POOL = {
            blue: [
                "AUG | Overgrowth", "Desert Eagle | Turbo", "Desert Eagle | Permafrost", "Dual Berettas | Vernal", 
                "Five-SeveN | Icecap", "Glock-18 | Broken TV", "P250 | B-250", "P250 | Glacial", "P250 | Pulse", 
                "Tec-9 | Monarch", "Tec-9 | Striker", "MAC-10 | Daisies", "MAC-10 | Ivory", "MP9 | Canyon", 
                "P90 | Big Cat", "P90 | Database", "MAG-7 | Vision 7", "Negev | Noctiflora", "Negev | Rotary Power", 
                "Negev | The Jungle", "Nova | Flutter", "Nova | Half-One", "Nova | Heat", "XM1014 | Abstract", 
                "XM1014 | Koi", "AUG | Predator", "FAMAS | Arctic Camo", "Galil AR | Irradiated", "SSG 08 | Desert Strike"
            ],
            purple: [
                "Desert Eagle | Paranoia", "Dual Berettas | Tension", "Five-SeveN | Control", "USP-S | Heated", 
                "M4A1-S | BlackOps", "FAMAS | Medic", "Galil AR | Monochrome"
            ],
            pink: [
                "Desert Eagle | Mercy", "Glock-18 | Fuji", "P250 | Mindspill", "XM1014 | Lilies", "AWP | Typhon", 
                "M4A4 | B-Hop", "M4A1-S | Retro", "SSG 08 | Labyrinth", "SG 553 | Dynasty", "SG 553 | Frostline"
            ]
        };

        let isSpinning = false;

        function updateUI() {
            document.getElementById('balance-val').innerText = balance + " 金幣";
            document.getElementById('total-spins-status').innerText = `全局累計總抽數: ${totalSpins} 次`;

            // 前端保底條按20次循環計算，滿20次歸零重新計算
            let barProgress = totalSpins % 20;
            if (barProgress === 0 && totalSpins > 0) {
                // 如果恰好是20的倍數，代表進度剛好滿了
                barProgress = 20;
            }
            document.getElementById('pity-percent-text').innerText = `當前保底進度: ${barProgress} / 20 次`;
            
            const barFillPercent = (barProgress / 20) * 100;
            document.getElementById('pity-bar-fill').style.width = barFillPercent + '%';

            localStorage.setItem('cs_balance_pink', balance);
            localStorage.setItem('cs_inventory_pink', JSON.stringify(inventory));
            localStorage.setItem('cs_total_spins_pink', totalSpins);

            renderInventory();
        }

        function getFairVisualSkin() {
            let r = Math.random() * 100;
            let targetRarity = 'blue';

            // 調整輪盤干擾格顯示比率（40%藍、35%紫、25%粉）
            if (r < 25.0) targetRarity = 'pink';
            else if (r < 60.0) targetRarity = 'purple';
            else targetRarity = 'blue';

            const pool = MASTER_VISUAL_POOL[targetRarity];
            const item = pool[Math.floor(Math.random() * pool.length)];
            return { name: item.name, rarity: item.rarity };
        }

        function setupTrack() {
            const track = document.getElementById('roulette-track');
            track.innerHTML = '';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            for(let i = 0; i < 40; i++) {
                track.appendChild(createCard(getFairVisualSkin()));
            }
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = `skin-card ${item.rarity}`;
            card.innerHTML = `<div class="skin-name">${item.name}</div>`;
            return card;
        }

        // 🤫 後台靜默硬性計數引擎（絕對不亂產出其餘稀有度）
        function calculatePityWin(currentSpinNum) {
            let selectedRarity = 'blue';

            // 1. 粉紅色硬保底判斷：第 14, 30 次；此後每隔 20 抽觸發一次
            let triggerPink = false;
            if (currentSpinNum === 14 || currentSpinNum === 30) {
                triggerPink = true;
            } else if (currentSpinNum > 30) {
                if ((currentSpinNum - 30) % 20 === 0) {
                    triggerPink = true;
                }
            }

            // 2. 紫色硬保底判斷：第 2, 9, 19, 25 次；此後每隔 10 抽觸發一次
            let triggerPurple = false;
            if (currentSpinNum === 2 || currentSpinNum === 9 || currentSpinNum === 19 || currentSpinNum === 25) {
                triggerPurple = true;
            } else if (currentSpinNum > 25) {
                if ((currentSpinNum - 25) % 10 === 0) {
                    triggerPurple = true;
                }
            }

            // 判定發放權重（粉紅優先級高於紫色）
            if (triggerPink) {
                selectedRarity = 'pink';
            } else if (triggerPurple) {
                selectedRarity = 'purple';
            } else {
                selectedRarity = 'blue';
            }

            // 從玩家指定的專屬乾淨庫提取
            let pool = PLAYER_OWNED_POOL[selectedRarity];
            if (!pool || pool.length === 0) {
                pool = PLAYER_OWNED_POOL.blue;
                selectedRarity = 'blue';
            }
            const name = pool[Math.floor(Math.random() * pool.length)];
            return { name: name, rarity: `rarity-${selectedRarity}` };
        }

        function startSpin(multiCount = 1) {
            if (isSpinning) return;
            
            const totalCost = 4 * multiCount; // 單抽 4 金幣

            if (balance < totalCost) {
                alert("❌ 金幣（餘額）不足！請先充值代碼。");
                return;
            }

            balance -= totalCost;
            let rollResults = [];

            for (let k = 0; k < multiCount; k++) {
                totalSpins++;
                let winSkin = calculatePityWin(totalSpins);
                rollResults.push(winSkin);
                inventory.push(winSkin);
            }

            updateUI();

            const isSkip = document.getElementById('skip-animation-checkbox').checked;
            if (isSkip) {
                showFullscreenReward(rollResults);
                setupTrack();
                return;
            }

            isSpinning = true;
            document.getElementById('spin-btn-1').disabled = true;
            document.getElementById('spin-btn-3').disabled = true;
            document.getElementById('spin-btn-5').disabled = true;

            const track = document.getElementById('roulette-track');
            track.innerHTML = '';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';

            const winIndex = 25; // 強制第 25 格為落點格
            const finalShowSkin = rollResults[rollResults.length - 1];

            for(let i = 0; i < 38; i++) {
                if (i === winIndex) {
                    track.appendChild(createCard(finalShowSkin));
                } else {
                    track.appendChild(createCard(getFairVisualSkin()));
                }
            }

            // 精確計算指針正中心物理偏置量
            setTimeout(() => {
                const cards = track.querySelectorAll('.skin-card');
                const targetCard = cards[winIndex];
                const viewport = document.querySelector('.roulette-viewport');
                
                if (targetCard && viewport) {
                    const cardWidth = targetCard.offsetWidth + 4; 
                    const viewportWidth = viewport.offsetWidth;
                    const targetOffset = (winIndex * cardWidth) + (cardWidth / 2) - (viewportWidth / 2);
                    
                    track.style.transition = 'transform 3.5s cubic-bezier(0.1, 0.9, 0.1, 1)';
                    track.style.transform = `translateX(-${targetOffset}px)`;
                } else {
                    track.style.transition = 'transform 3.5s cubic-bezier(0.1, 0.9, 0.1, 1)';
                    track.style.transform = 'translateX(-2538px)';
                }
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spin-btn-1').disabled = false;
                document.getElementById('spin-btn-3').disabled = false;
                document.getElementById('spin-btn-5').disabled = false;
                showFullscreenReward(rollResults);
                setupTrack();
            }, 3600);
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            if (inventory.length === 0) {
                grid.innerHTML = '<div style="color: #666; font-size:12px; padding: 20px; grid-column: 1/-1; text-align:center;">背包目前空空如也，快去試試手氣吧！</div>';
                return;
            }
            inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'inv-item';
                div.innerHTML = `
                    <div class="inv-item-name">${item.name}</div>
                    <div class="inv-actions">
                        <button class="inv-btn btn-withdraw" onclick="withdrawItem(${index})">提取道具</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function withdrawItem(index) {
            const item = inventory[index];
            alert(`申請成功！請複製抽中道具：\n「${item.name}」\n前往聯絡客服，將在12小時內手動發貨！`);
        }

        function showFullscreenReward(skins) {
            const modal = document.getElementById('reward-fullscreen-modal');
            const container = document.getElementById('fullscreen-reward-container');
            container.innerHTML = '';

            skins.forEach((skin, idx) => {
                const card = document.createElement('div');
                card.className = `reward-card ${skin.rarity}`;
                card.innerHTML = `
                    <div style="font-size:10px; color:#aaa;">第 ${idx + 1} 抽</div>
                    <div class="reward-card-name">${skin.name}</div>
                `;
                container.appendChild(card);
            });
            modal.style.display = 'flex';
        }

        function closeFullscreenModal() {
            document.getElementById('reward-fullscreen-modal').style.display = 'none';
        }

        function redeemCDK() {
            const input = document.getElementById('cdk-input').value.trim();
            if (VALID_CDKS[input]) {
                const amount = VALID_CDKS[input];
                balance += amount;
                alert(`🎉 兌換成功！已成功充值 ${amount} 金幣。`);
                delete VALID_CDKS[input];
                document.getElementById('cdk-input').value = "";
                updateUI();
            } else {
                alert("❌ 無效的充值碼。");
            }
        }

        // 初始化
        setupTrack();
        updateUI();
    </script>
</body>
</html>
