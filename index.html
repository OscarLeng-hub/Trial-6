<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 歐皇神話至尊盲盒 (硬性保底控制版)</title>
    <style>
        :root {
            --primary: #ff4e50;
            --dark-bg: #0b0c10;
            --card-bg: #14161d;
            --border-color: #222530;
            --gold: #fbc02d;
            --red: #eb4b4b;
            --pink: #d32ce6;
            --purple: #8847ff;
            --blue: #4b69ff;
        }

        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            background-color: #07080b;
            padding: 15px 0;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff4e50, #fbc02d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-box {
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .main-container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .machine-tabs {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active[data-machine="guns"] {
            background: linear-gradient(45deg, #ff4e50, #fbc02d);
            color: #fff;
            border: none;
        }

        .tab-btn.active[data-machine="pink_purple"] {
            background: linear-gradient(45deg, #d32ce6, #8847ff);
            color: #fff;
            border: none;
        }

        .tab-btn.active[data-machine="swords"] {
            background: linear-gradient(45deg, #4b69ff, #00f0ff);
            color: #fff;
            border: none;
        }

        .machine-section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .machine-section.active {
            display: flex;
        }

        .config-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .config-title {
            font-size: 16px;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .config-row input {
            width: 80px;
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 4px;
            border-radius: 4px;
            text-align: center;
        }

        .display-wall {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        .wall-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .item-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
        }

        .item-card.gold::before { background: var(--gold); }
        .item-card.red::before { background: var(--red); }
        .item-card.pink::before { background: var(--pink); }
        .item-card.purple::before { background: var(--purple); }
        .item-card.blue::before { background: var(--blue); }

        .item-name {
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-prob {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .draw-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
        }

        .draw-btn:active {
            transform: scale(0.95);
        }

        .btn-guns { background: linear-gradient(45deg, #ff4e50, #fbc02d); }
        .btn-pink_purple { background: linear-gradient(45deg, #d32ce6, #8847ff); }
        .btn-swords { background: linear-gradient(45deg, #4b69ff, #00f0ff); }

        .history-panel {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: bold;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .history-item .tag {
            font-weight: bold;
        }

        .tag.gold { color: var(--gold); }
        .tag.red { color: var(--red); }
        .tag.pink { color: var(--pink); }
        .tag.purple { color: var(--purple); }
        .tag.blue { color: var(--blue); }

        .modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #1a1d26;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .fullscreen-reward-modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(5, 5, 8, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .reward-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .fullscreen-reward-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        .reward-card {
            background: #14161d;
            border: 2px solid #222530;
            border-radius: 12px;
            padding: 20px;
            width: 160px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .reward-card.gold { border-color: var(--gold); box-shadow: 0 0 15px rgba(251,192,45,0.4); }
        .reward-card.red { border-color: var(--red); box-shadow: 0 0 15px rgba(235,75,75,0.4); }
        .reward-card.pink { border-color: var(--pink); box-shadow: 0 0 15px rgba(211,44,230,0.4); }
        .reward-card.purple { border-color: var(--purple); box-shadow: 0 0 15px rgba(136,71,255,0.4); }
        .reward-card.blue { border-color: var(--blue); box-shadow: 0 0 15px rgba(75,105,255,0.4); }

        .reward-card-name {
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
        }

        .modal-btn {
            margin-top: 30px;
            padding: 12px 35px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
        }

        .info-btn {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">CS2 歐皇神話至尊盲盒</div>
        <div class="balance-box">餘額: $<span id="user-balance">50000</span></div>
    </header>

    <div class="main-container">
        
        <div class="machine-tabs">
            <button class="tab-btn active" data-machine="guns" onclick="switchMachine('guns')">精選槍械飾品機 ($45)</button>
            <button class="tab-btn" data-machine="pink_purple" onclick="switchMachine('pink_purple')">保底粉紫盒 ($19)</button>
            <button class="tab-btn" data-machine="swords" onclick="switchMachine('swords')">自訂武器箱</button>
        </div>

        <div id="machine-guns" class="machine-section active">
            <div class="config-panel">
                <div class="config-title"><span>精選槍械飾品機（概率已鎖定）</span></div>
                <div class="config-row">
                    <span>當前累計總消費：</span>
                    <span style="color:var(--gold); font-weight:bold;">$<span id="stat-guns-spent">0</span></span>
                </div>
            </div>
            <div class="display-wall">
                <div class="wall-title">本箱包含獎池道具一覽</div>
                <div class="item-grid" id="grid-guns"></div>
            </div>
        </div>

        <div id="machine-pink_purple" class="machine-section">
            <div class="config-panel">
                <div class="config-title">粉紫盲盒控制面板</div>
                <div class="config-row">
                    <span>當前已連黑抽數（未中粉色）：</span>
                    <span style="color:var(--pink); font-weight:bold;"><span id="stat-pp-badluck">0</span> 抽</span>
                </div>
            </div>
            <div class="display-wall">
                <div class="wall-title">粉紫盲盒獎池一覽</div>
                <div class="item-grid" id="grid-pink_purple"></div>
            </div>
        </div>

        <div id="machine-swords" class="machine-section">
            <div class="config-panel">
                <div class="config-title">自訂武器箱設定</div>
                <div id="swords-dynamic-config"></div>
            </div>
            <div class="display-wall">
                <div class="wall-title">自訂武器箱當前獎池</div>
                <div class="item-grid" id="grid-swords"></div>
            </div>
        </div>

        <div class="action-area">
            <div class="btn-group">
                <button id="btn-single" class="draw-btn btn-guns" onclick="executeDraw(1)">單抽 ($45)</button>
                <button id="btn-ten" class="draw-btn btn-guns" onclick="executeDraw(10)">十連抽</button>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header"><span>即時抽獎歷史記錄</span></div>
            <div class="history-list" id="history-container">
                <div style="color:#555; text-align:center; padding:10px;">暫無抽獎記錄</div>
            </div>
        </div>
    </div>

    <div id="reward-fullscreen-modal" class="fullscreen-reward-modal">
        <div class="reward-title" id="reward-title-main">恭喜獲得以下道具</div>
        <div class="fullscreen-reward-container" id="fullscreen-reward-container"></div>
        <div><button class="modal-btn" onclick="closeFullscreenModal()">收下道具</button></div>
    </div>

    <script>
        let balance = 50000;
        let currentMachine = 'guns';
        let totalGunsSpent = 0;
        let hasWonGold = false; 
        let pinkPurpleBadLuck = 0;

        const prices = { guns: 45, pink_purple: 19, swords: 30 };

        // 精選槍械飾品機獎池：藍90%, 紫7%, 粉3%, 紅0%
        const gunsPool = [
            { name: "AUG | Overgrowth", rarity: "blue", prob: 0.90 },
            { name: "Desert Eagle | Mercy", rarity: "blue", prob: 0.00 },
            { name: "Desert Eagle | Paranoia", rarity: "blue", prob: 0.00 },
            { name: "Desert Eagle | Permafrost", rarity: "blue", prob: 0.00 },
            { name: "Desert Eagle | Turbo", rarity: "blue", prob: 0.00 },
            { name: "Dual Berettas | Choking Hazard", rarity: "blue", prob: 0.00 },
            { name: "Dual Berettas | Tension", rarity: "blue", prob: 0.00 },
            { name: "Dual Berettas | Vernal", rarity: "blue", prob: 0.00 },
            { name: "Five-SeveN | Control", rarity: "blue", prob: 0.00 },
            { name: "Five-SeveN | Icecap", rarity: "blue", prob: 0.00 },
            { name: "Glock-18 | Broken Tv", rarity: "blue", prob: 0.00 },
            { name: "Glock-18 | Fuji", rarity: "blue", prob: 0.00 },
            { name: "P250 | B-250", rarity: "blue", prob: 0.00 },
            { name: "P250 | Glacial", rarity: "blue", prob: 0.00 },
            { name: "P250 | Mindspill", rarity: "blue", prob: 0.00 },
            { name: "P250 | Pulse", rarity: "blue", prob: 0.00 },
            { name: "Tec-9 | Monarch", rarity: "blue", prob: 0.00 },
            { name: "Tec-9 | Striker", rarity: "blue", prob: 0.00 },
            { name: "USP-S | Heated", rarity: "blue", prob: 0.00 },
            { name: "MAC-10 | Daisies", rarity: "blue", prob: 0.00 },
            { name: "MAC-10 | Ivory", rarity: "blue", prob: 0.00 },
            { name: "MP9 | Canyon", rarity: "blue", prob: 0.00 },
            { name: "P90 | Big Cat", rarity: "blue", prob: 0.00 },
            { name: "P90 | Database", rarity: "blue", prob: 0.00 },
            { name: "MAG-7 | Vision 7", rarity: "blue", prob: 0.00 },
            { name: "Negev | Noctiflora", rarity: "blue", prob: 0.00 },
            { name: "Negev | Rotary Power", rarity: "blue", prob: 0.00 },
            { name: "Negev | The Jungle", rarity: "blue", prob: 0.00 },
            { name: "Nova | Flutter", rarity: "blue", prob: 0.00 },
            { name: "Nova | Half+One", rarity: "blue", prob: 0.00 },
            { name: "Nova | Heat", rarity: "blue", prob: 0.00 },
            { name: "XM1014 | Abstract", rarity: "blue", prob: 0.00 },
            { name: "XM1014 | Koi", rarity: "blue", prob: 0.00 },
            { name: "XM1014 | Lilies", rarity: "blue", prob: 0.00 },
            
            { name: "AK-47 | PinPoint", rarity: "purple", prob: 0.07 },
            { name: "AK-47 | Red Baron", rarity: "purple", prob: 0.00 },
            { name: "AUG | Hot Rod", rarity: "purple", prob: 0.00 },
            { name: "AUG | Predator", rarity: "purple", prob: 0.00 },
            { name: "AWP | Typhon", rarity: "purple", prob: 0.00 },
            { name: "FAMAS | Arctic Camo", rarity: "purple", prob: 0.00 },
            { name: "FAMAS | Medic", rarity: "purple", prob: 0.00 },
            { name: "Galil AR | Irid", rarity: "purple", prob: 0.00 },
            { name: "Galil AR | Irradiated", rarity: "purple", prob: 0.00 },
            { name: "Galil AR | Monochrome", rarity: "purple", prob: 0.00 },
            { name: "M4A1-S | BlackOps", rarity: "purple", prob: 0.00 },
            { name: "M4A1-S | Retro", rarity: "purple", prob: 0.00 },
            { name: "M4A4 | B-Hop", rarity: "purple", prob: 0.00 },
            { name: "SG 553 | Dynasty", rarity: "purple", prob: 0.00 },
            { name: "SG 553 | Frostline", rarity: "purple", prob: 0.00 },
            { name: "SSG 08 | Desert Strike", rarity: "purple", prob: 0.00 },
            { name: "SSG 08 | Labyrinth", rarity: "purple", prob: 0.00 },

            { name: "M4A1-S | 隱秘金飾", rarity: "pink", prob: 0.03 }
        ];

        const pinkPurplePool = [
            { name: "AWP | 珊瑚樹 (粉色)", rarity: "pink", prob: 0.25 },
            { name: "AK-47 | 前線衝鋒 (紫色)", rarity: "purple", prob: 0.35 },
            { name: "M4A1-S | 噩夢 (紫色)", rarity: "purple", prob: 0.40 }
        ];

        let swordsPool = [
            { name: "⭐ 蝴蝶刀 | 漸層大理石", rarity: "gold", prob: 0.10 },
            { name: "⭐ M9 刺刀 | 多ppler", rarity: "red", prob: 0.15 },
            { name: "⭐ 卡拉姆比特刀 | 屠殺", rarity: "pink", prob: 0.25 },
            { name: "⭐ 流浪者刀 | 表面淬火", rarity: "purple", prob: 0.50 }
        ];

        function renderPoolGrid(pool, gridId) {
            const container = document.getElementById(gridId);
            container.innerHTML = '';
            pool.forEach(item => {
                if (item.prob > 0) {
                    const card = document.createElement('div');
                    card.className = `item-card ${item.rarity}`;
                    card.innerHTML = `<div class="item-name">${item.name}</div><div class="item-prob">機率: ${(item.prob * 100).toFixed(0)}%</div>`;
                    container.appendChild(card);
                }
            });
        }

        renderPoolGrid(gunsPool, 'grid-guns');
        renderPoolGrid(pinkPurplePool, 'grid-pink_purple');
        renderPoolGrid(swordsPool, 'grid-swords');

        function switchMachine(type) {
            currentMachine = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-machine="${type}"]`).classList.add('active');
            document.querySelectorAll('.machine-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`machine-${type}`).classList.add('active');
            const sBtn = document.getElementById('btn-single');
            const tBtn = document.getElementById('btn-ten');
            sBtn.innerText = `單抽 ($${prices[type]})`;
            tBtn.innerText = type === 'swords' ? '自訂五連抽' : '十連抽';
        }

        function executeDraw(times) {
            if (currentMachine === 'swords' && times === 10) times = 5;
            const cost = prices[currentMachine] * times;
            if (balance < cost) { alert('餘額不足'); return; }
            balance -= cost;
            document.getElementById('user-balance').innerText = balance;
            let results = [];
            for (let i = 0; i < times; i++) {
                let reward = null;
                if (currentMachine === 'guns') {
                    totalGunsSpent += prices.guns;
                    document.getElementById('stat-guns-spent').innerText = totalGunsSpent;
                    if (totalGunsSpent >= 800 && !hasWonGold) {
                        reward = { name: "★ 隱秘金槍 (保底)", rarity: "gold" };
                        hasWonGold = true;
                    } else {
                        reward = getRandomItem(gunsPool);
                        if (reward.rarity === 'gold') hasWonGold = true;
                    }
                } else if (currentMachine === 'pink_purple') {
                    pinkPurpleBadLuck++;
                    reward = getRandomItem(pinkPurplePool);
                    if (reward.rarity === 'pink') pinkPurpleBadLuck = 0;
                    document.getElementById('stat-pp-badluck').innerText = pinkPurpleBadLuck;
                } else {
                    reward = getRandomItem(swordsPool);
                }
                results.push(reward);
                addHistoryLog(reward);
            }
            showFullscreenReward(results);
        }

        function getRandomItem(pool) {
            let r = Math.random();
            let sum = 0;
            for (let item of pool) {
                sum += item.prob;
                if (r <= sum) return item;
            }
            return pool[0];
        }

        function addHistoryLog(item) {
            const container = document.getElementById('history-container');
            if (container.innerHTML.includes('暫無抽獎記錄')) container.innerHTML = '';
            const log = document.createElement('div');
            log.className = 'history-item';
            log.innerHTML = `<span>抽中</span><span class="tag ${item.rarity}">${item.name}</span>`;
            container.insertBefore(log, container.firstChild);
            if (container.children.length > 5) container.removeChild(container.lastChild);
        }

        function showFullscreenReward(skins) {
            const modal = document.getElementById('reward-fullscreen-modal');
            const container = document.getElementById('fullscreen-reward-container');
            container.innerHTML = '';
            skins.forEach((skin, idx) => {
                const card = document.createElement('div');
                card.className = `reward-card ${skin.rarity}`;
                card.innerHTML = `<div class="reward-card-name">${skin.name}</div>`;
                container.appendChild(card);
            });
            modal.style.display = 'flex';
        }

        function closeFullscreenModal() { document.getElementById('reward-fullscreen-modal').style.display = 'none'; }
    </script>
</body>
</html>
